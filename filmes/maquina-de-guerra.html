<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Máquina de Guerra - 2026</title>

<style>
body, html{
    margin:0;
    height:100%;
}

#player{
    width:100%;
    height:100%;
    position:absolute;
    left:0;
    top:0;
    border:none;
    transition: transform 0.5s;
}

.rotacionado{
    transform: rotate(90deg);
    transform-origin: center center;
}
</style>
</head>

<body>

<iframe 
    id="player"
    src="https://geo.dailymotion.com/player.html?video=xa1nqso"
    allowfullscreen
    allow="web-share; fullscreen"
    title="Dailymotion Video Player">
</iframe>

<script>
document.addEventListener("fullscreenchange", function () {
    const player = document.getElementById("player");

    if (document.fullscreenElement) {
        player.classList.add("rotacionado");
    } else {
        player.classList.remove("rotacionado");
    }
});
</script>

</body>
</html>
